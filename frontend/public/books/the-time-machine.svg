<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 580" role="img" aria-labelledby="title desc">
  <title id="title">The Time Machine - H. G. Wells</title>
  <desc id="desc">Couverture noire et dorée du roman The Time Machine de H. G. Wells, avec engrenages et horloge.</desc>
  <defs>
    <radialGradient id="glow" cx="55%" cy="48%" r="55%">
      <stop offset="0" stop-color="#f9d66c" stop-opacity="0.42"/>
      <stop offset="0.48" stop-color="#9b6b1e" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#030303" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff2a8"/>
      <stop offset="0.3" stop-color="#dcae49"/>
      <stop offset="0.72" stop-color="#8e651e"/>
      <stop offset="1" stop-color="#ffe38b"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.35" stop-color="#9da3ad"/>
      <stop offset="0.7" stop-color="#424854"/>
      <stop offset="1" stop-color="#f3f4f6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000000" flood-opacity="0.7"/>
    </filter>
  </defs>
  <rect width="420" height="580" fill="#030303"/>
  <rect x="18" y="16" width="384" height="548" fill="#090909"/>
  <rect x="34" y="30" width="352" height="520" fill="#050505" stroke="#151515" stroke-width="3"/>
  <rect x="0" y="0" width="420" height="580" fill="url(#glow)"/>

  <text x="210" y="82" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="48" font-weight="700" letter-spacing="4" fill="#f8d06c">THE TIME</text>
  <text x="210" y="145" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="48" font-weight="700" letter-spacing="4" fill="#f8d06c">MACHINE</text>

  <g transform="translate(78 176)" filter="url(#shadow)">
    <g transform="translate(126 178)">
      <circle r="86" fill="url(#steel)"/>
      <circle r="70" fill="#111827"/>
      <circle r="59" fill="#141414" stroke="url(#gold)" stroke-width="7"/>
      <circle r="45" fill="#0b0b0b" stroke="#6f531d" stroke-width="2"/>
      <g stroke="#f8d06c" stroke-width="2">
        <line x1="0" y1="-52" x2="0" y2="-42"/>
        <line x1="26" y1="-45" x2="20" y2="-36"/>
        <line x1="45" y1="-26" x2="36" y2="-20"/>
        <line x1="52" y1="0" x2="42" y2="0"/>
        <line x1="45" y1="26" x2="36" y2="20"/>
        <line x1="26" y1="45" x2="20" y2="36"/>
        <line x1="0" y1="52" x2="0" y2="42"/>
        <line x1="-26" y1="45" x2="-20" y2="36"/>
        <line x1="-45" y1="26" x2="-36" y2="20"/>
        <line x1="-52" y1="0" x2="-42" y2="0"/>
        <line x1="-45" y1="-26" x2="-36" y2="-20"/>
        <line x1="-26" y1="-45" x2="-20" y2="-36"/>
      </g>
      <line x1="0" y1="0" x2="0" y2="-36" stroke="#f8d06c" stroke-width="4" stroke-linecap="round"/>
      <line x1="0" y1="0" x2="31" y2="14" stroke="#f8d06c" stroke-width="4" stroke-linecap="round"/>
      <circle r="8" fill="url(#gold)"/>
    </g>

    <g transform="translate(232 72)">
      <circle r="54" fill="url(#steel)"/>
      <circle r="39" fill="#101010"/>
      <circle r="29" fill="#060606" stroke="url(#gold)" stroke-width="5"/>
      <g stroke="#1f2937" stroke-width="7">
        <line x1="0" y1="-72" x2="0" y2="-55"/>
        <line x1="51" y1="-51" x2="39" y2="-39"/>
        <line x1="72" y1="0" x2="55" y2="0"/>
        <line x1="51" y1="51" x2="39" y2="39"/>
        <line x1="0" y1="72" x2="0" y2="55"/>
        <line x1="-51" y1="51" x2="-39" y2="39"/>
        <line x1="-72" y1="0" x2="-55" y2="0"/>
        <line x1="-51" y1="-51" x2="-39" y2="-39"/>
      </g>
    </g>

    <g transform="translate(252 260)">
      <circle r="57" fill="#4b5563"/>
      <circle r="44" fill="url(#steel)"/>
      <circle r="31" fill="url(#gold)"/>
      <circle r="18" fill="#f9e18d"/>
      <g stroke="#111827" stroke-width="8">
        <line x1="0" y1="-76" x2="0" y2="-58"/>
        <line x1="54" y1="-54" x2="41" y2="-41"/>
        <line x1="76" y1="0" x2="58" y2="0"/>
        <line x1="54" y1="54" x2="41" y2="41"/>
        <line x1="0" y1="76" x2="0" y2="58"/>
        <line x1="-54" y1="54" x2="-41" y2="41"/>
        <line x1="-76" y1="0" x2="-58" y2="0"/>
        <line x1="-54" y1="-54" x2="-41" y2="-41"/>
      </g>
    </g>

    <g fill="url(#gold)" opacity="0.94">
      <g transform="translate(42 66)">
        <circle r="25"/>
        <circle r="14" fill="#090909"/>
        <circle r="6"/>
        <g stroke="#dcae49" stroke-width="7">
          <line x1="0" y1="-39" x2="0" y2="-25"/>
          <line x1="28" y1="-28" x2="18" y2="-18"/>
          <line x1="39" y1="0" x2="25" y2="0"/>
          <line x1="28" y1="28" x2="18" y2="18"/>
          <line x1="0" y1="39" x2="0" y2="25"/>
          <line x1="-28" y1="28" x2="-18" y2="18"/>
          <line x1="-39" y1="0" x2="-25" y2="0"/>
          <line x1="-28" y1="-28" x2="-18" y2="-18"/>
        </g>
      </g>
      <g transform="translate(282 150)">
        <circle r="31"/>
        <circle r="18" fill="#090909"/>
        <circle r="8"/>
      </g>
      <g transform="translate(86 286)">
        <circle r="34"/>
        <circle r="20" fill="#090909"/>
        <circle r="8"/>
      </g>
      <g transform="translate(312 210)">
        <circle r="22"/>
        <circle r="12" fill="#090909"/>
      </g>
    </g>
  </g>

  <text x="210" y="525" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="45" font-weight="700" letter-spacing="3" fill="#f8d06c">H. G. WELLS</text>
</svg>
